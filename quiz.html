<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task2->Quiz</title>
    <link href="./dist/output.css" rel="stylesheet">
  </head>
  <body>
  <div class="relative h-screen">
  <div class="absolute inset-0">
    <div class="absolute inset-0 -z-10 h-full w-full bg-white bg-[linear-gradient(to_right,#f0f0f0_1px,transparent_1px),linear-gradient(to_bottom,#f0f0f0_1px,transparent_1px)] bg-size-[6rem_4rem] [&>div]:absolute [&>div]:inset-0 [&>div]:bg-[radial-gradient(circle_800px_at_100%_200px,#d5c5ff,transparent)]">
    <div>
  </div>
  </div>
    <header class="grid justify-items-center m-5">
      <div class=" mb-8 text-4xl font-bold tracking-tight sm:text-6xl lg:text-7xl text-slate-900">
        <h1 class="text-sky-900">Test Your Knowledge</h1>
      <div class=" bg-sky-900 rounded-full h-4 overflow-hidden m-4 p-0.5">
      <div id="progress-bar" 
      class="bg-white h-full rounded-full transition-all duration-300" 
      style="width: 0%">
      </div>
      </div>
    </header>

    <div class="ques-block grid justify-items-center m-5" id="quiz">
      <div class="flex-1">
        <h2 id="ques-text" class="flex-1 max-w-full overflow-hidden items-stretch  bg-white border-2 border-sky-900 rounded-2xl p-2">questions loading.....</h2>
      </div>

      <div id="ans-btns" class="grid grid-cols-2 gap-4 max-w-md mx-auto">
          <button id="optn" class=" border-2 border-sky-900 rounded-2xl"></button>
          <button id="optn" class=" border-2 border-sky-900 rounded-2xl"></button>
          <button id="optn" class=" border-2 border-sky-900 rounded-2xl"></button>
          <button id="optn" class=" border-2 border-sky-900 rounded-2xl"></button>
      </div>

      <div class="controls flex flex-wrap justify-center gap-4">
        <button id="nxt-btn" class="nxt-btn hide rounded-lg px-6 py-3 font-medium bg-sky-900 text-white hover:bg-sky-800">Next</button>
        <button id="submit-btn" class="submit-btn hide rounded-lg px-6 py-3 font-medium bg-sky-900 text-white hover:bg-sky-800">See Results</button>
      </div>

      <div id="result-container" class="hide">
        <h2 class="mx-auto mb-8 max-w-2xl text-lg text-slate-700">Quiz Completed!</h2>
        <p class="mx-auto mb-8 max-w-2xl m text-lg text-slate-700">Your Score: <span id="score">0</span></p>
        <button id="restart-btn" class="submit-btn  rounded-lg px-6 py-3 font-medium bg-sky-900 text-white hover:bg-sky-800"><a href="./quiz.html" >Restart Quiz</a></button>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
